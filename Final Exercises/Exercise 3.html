<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students grades Calculator ® § ≥</title>
</head>
<style>
    body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: #d0cfe8;
    }
    h1 {
        text-align: center;
        color: rgb(0, 0, 0);
    }
    table {
        margin: 0% auto;
        border-collapse: collapse;
        width: 50%;
        border-radius: 12px;   /* bo góc */
        overflow : hidden;     /* ẩn phần thừa */
    }
    table tr:hover {
        background-color: rgb(253, 253, 253);
    }
    th, td {
        border: 2px solid rgb(8, 15, 91);
        padding: 8px;
        text-align: left;
    }
    button {
        display: block;
        margin: 20px auto;
        padding: 10px 20px;
        font-size: 16px;
        background-color: #8e95de;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
</style>
<body>
    <h1>Students grades Calculator ® § ≥</h1>

    <table>
        <tr>
            <th>Subject</th>
            <th>Grade</th>
        </tr>
        <tr>
            <td>Toán</td>
            <td><input type="number" class="grade"></td>
        </tr>
        <tr>
            <td>Vật lý</td>
            <td><input type="number" class="grade"></td>
        </tr>
        <tr>
            <td>Hóa học</td>
            <td><input type="number" class="grade"></td>
        </tr>
        <tr>
            <td>Tiếng Anh</td>
            <td><input type="number" class="grade"></td>
        </tr>
    </table>

    <button onclick="calculateAverage()">Tính kết quả trung bình</button>
    <p id="result"></p>

<script>
    function calculateAverage() {
        const gradeInputs = document.querySelectorAll('.grade');
        let total = 0;
        let count = 0;

        gradeInputs.forEach(input => {
            const grade = parseFloat(input.value);
            if (!isNaN(grade)) {
                total += grade;
                count++;
            }
        });

        const average = count > 0 ? (total / count).toFixed(2) : 0;
        document.getElementById('result').textContent = `Điểm trung bình: ${average}`;
    }
</script>
</body>
</html>
