<!DOCTYPE html>
<html>
<head>
    <title>Rectangle Calculator</title>
<style>
    body {
        background-color: rgb(230, 203, 245);
    }
    .box {
        width: 300px;
        margin: 50px auto;
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 5px;
        text-align: center;
        background-color: aliceblue;
    }
    label {
        display: block;
        margin-top: 10px;
    }
    input {
        width: 100%;
        padding: 5px;
        margin-top: 5px;
        border-radius: 3px;
    }
    button {
        margin-top: 15px;
        padding: 10px 20px;
        border-radius: 3px;
    }
</style>
</head>
<script>
    function calculateArea() {
        let length = Number(document.getElementById("length").value);
        let width = Number(document.getElementById("width").value);
        let perimeter = 2 * (length + width);
        let area = length * width;
        document.getElementById("result").innerHTML = "Perimeter: " + perimeter + "<br>Area: " + area;
    }
</script>
<body>
    <div class="box">
        <h1>Calculate Rectangle</h1>
        <label> Length:</label>
        <input type="number" id="length">
        <br>
        <label> Width:</label>
        <input type="number" id="width">
        <br>
        <button onclick="calculateArea()">Calculate Area</button>
        <p id="result"></p>
    </div>
</body>
