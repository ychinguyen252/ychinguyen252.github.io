<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>REGISTRATION</h2>

    <form>
        <div class="form-group">
            <label>Username:</label>
            <input type="text">
        </div>
        <div class="form-group">
            <label>Password:</label>
            <input type="password">
        </div>
        <div class="form-group">
            <label>Re-type Password:</label>
            <input type="password">
        </div>
        <hr>
        <div class="form-group">
            <label>Birthday:</label>
            <select>
                <option>[select one]</option>
                <option>Jan</option>
                <option>Feb</option>
            </select>
            <input type="text" class="small">
            <input type="text" class="small">
        </div>
        <div class="form-group">
            <label>Images:</label>
            <input type="file">
        </div>
        <hr>
        <div class="form-group">
            <label>First Name:</label>
            <input type="text" class="half">      
            <label class="inline">Last Name:</label>
            <input type="text" class="half">
        </div>
        <hr>
        <div class="form-group">
            <label>Interests (optional):</label>
            <div class="checkbox-group">
                <div>
                    <input type="checkbox"> Entertainment<br>
                    <input type="checkbox"> Home & Family<br>
                    <input type="checkbox"> Health<br>
                    <input type="checkbox"> Music
                </div>
                <div>
                    <input type="checkbox"> Business<br>
                    <input type="checkbox"> Computers & Technology<br>
                    <input type="checkbox"> Personal Finance<br>
                    <input type="checkbox"> Small Business
                </div>
            </div>
        </div>
        <button type="submit">REGISTER</button>
    </form>
</div>

</body>
</html>
